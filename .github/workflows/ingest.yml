name: nightly-ingest

# Runs the Guardian scrape on GitHub's runners (long jobs are fine here, unlike
# serverless) and writes the normalized data to the shared Postgres that Vercel
# reads from. Schedule it just after Oklahoma's ~midnight extract rebuild.
on:
  schedule:
    - cron: "30 6 * * *"        # 06:30 UTC daily
    - cron: "0 1,13 17,18 6 *"  # election window: extra pulls Jun 17-18
  workflow_dispatch: {}          # manual "Run workflow" button

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra postgres
      - name: Ingest Guardian -> Postgres
        env:
          GUARDIAN_DATABASE_URL: ${{ secrets.GUARDIAN_DATABASE_URL }}
          GUARDIAN_DEFAULT_CYCLE_YEAR: "2026"
        run: uv run guardian-ingest
