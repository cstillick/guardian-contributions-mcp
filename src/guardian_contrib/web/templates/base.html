<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}The Guardian Ledger{% endblock %}</title>
  <meta name="description" content="Oklahoma campaign-finance disclosure — combined Pre-Primary and Continuing contributions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/ledger.css?v={{ asset_v() }}">
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="/">The Guardian Ledger<span class="tick">.</span></a>
      <nav class="navlinks">
        <a href="/" class="{{ 'active' if active=='dashboard' }}">Roster</a>
        <a href="/flags" class="{{ 'active' if active=='flags' }}">Flags</a>
      </nav>
      <form class="search" method="get" action="/search" role="search">
        <input name="q" value="{{ q or '' }}" placeholder="Search candidates…" aria-label="Search candidates">
      </form>
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="wrap">
    Source: Oklahoma Ethics Commission · <a href="https://guardian.ok.gov" rel="noopener">Guardian</a>.
    Ending balances omit continuing-period spending. Built from the
    <a href="https://github.com/cstillick/guardian-contributions-mcp">guardian-contributions</a> service.
  </footer>

  <script src="/static/app.js?v={{ asset_v() }}" defer></script>
</body>
</html>
